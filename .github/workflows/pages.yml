name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          ADF6B6: ${{ secrets.ADF6B6 }}
          B89D4E: ${{ secrets.B89D4E }}
        run: |
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('ADF6B6', '')
          tag_b = os.environ.get('B89D4E', '')
          fpath = pathlib.Path('index.html')
          orig = fpath.read_text(encoding='utf-8')
          updated = orig
          if tag_a:
              updated = updated.replace('<!-- a84313f04b80ac24ae8d606df0 -->', tag_a)
          if tag_b:
              updated = updated.replace('<!-- 83465c3b0e39d8abab2e8a -->', tag_b)
          if updated == orig and (tag_a or tag_b):
              sys.exit(1)
          if updated != orig:
              fpath.write_text(updated, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
